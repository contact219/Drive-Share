<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rush Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6B35',
            secondary: '#004E89',
            accent: '#F7B801',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app">
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
      <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-primary">Rush Admin</h1>
          <p class="text-gray-600 mt-2">Sign in to manage your fleet</p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="login-email" value="admin@rush.com" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="login-password" value="admin123" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary" required>
          </div>
          <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-opacity-90 transition">
            Sign In
          </button>
        </form>
        <p id="login-error" class="text-red-500 text-center mt-4 hidden"></p>
      </div>
    </div>

    <div id="dashboard-screen" class="hidden">
      <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
          <h1 class="text-2xl font-bold text-primary">Rush Admin</h1>
          <div class="flex items-center gap-4">
            <span id="admin-name" class="text-gray-600"></span>
            <button onclick="logout()" class="text-gray-500 hover:text-primary">Logout</button>
          </div>
        </div>
      </nav>

      <div class="max-w-7xl mx-auto px-4 py-8">
        <div id="stats" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Users</p>
            <p id="stat-users" class="text-3xl font-bold text-secondary">-</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Vehicles</p>
            <p id="stat-vehicles" class="text-3xl font-bold text-secondary">-</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Active Trips</p>
            <p id="stat-active" class="text-3xl font-bold text-primary">-</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">Total Revenue</p>
            <p id="stat-revenue" class="text-3xl font-bold text-green-600">-</p>
          </div>
        </div>

        <div class="flex gap-4 mb-6">
          <button onclick="showTab('vehicles')" id="tab-vehicles" class="px-6 py-2 rounded-lg bg-primary text-white font-medium">Vehicles</button>
          <button onclick="showTab('users')" id="tab-users" class="px-6 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300">Users</button>
          <button onclick="showTab('trips')" id="tab-trips" class="px-6 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300">Trips</button>
        </div>

        <div id="content-vehicles" class="bg-white rounded-xl shadow-sm">
          <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-xl font-semibold">Vehicle Management</h2>
            <button onclick="openVehicleModal()" class="bg-primary text-white px-4 py-2 rounded-lg font-medium hover:bg-opacity-90">+ Add Vehicle</button>
          </div>
          <div id="vehicles-list" class="divide-y"></div>
        </div>

        <div id="content-users" class="bg-white rounded-xl shadow-sm hidden">
          <div class="p-6 border-b">
            <h2 class="text-xl font-semibold">User Management</h2>
          </div>
          <div id="users-list" class="divide-y"></div>
        </div>

        <div id="content-trips" class="bg-white rounded-xl shadow-sm hidden">
          <div class="p-6 border-b">
            <h2 class="text-xl font-semibold">Trip Management</h2>
          </div>
          <div id="trips-list" class="divide-y"></div>
        </div>
      </div>
    </div>

    <div id="vehicle-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
      <div class="bg-white rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <h3 id="modal-title" class="text-xl font-semibold mb-4">Add Vehicle</h3>
        <form id="vehicle-form" class="space-y-4">
          <input type="hidden" id="vehicle-id">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
              <input type="text" id="vehicle-name" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
              <input type="text" id="vehicle-brand" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
              <input type="text" id="vehicle-model" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
              <input type="number" id="vehicle-year" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
              <select id="vehicle-type" class="w-full px-3 py-2 border rounded-lg" required>
                <option value="sedan">Sedan</option>
                <option value="suv">SUV</option>
                <option value="sports">Sports</option>
                <option value="luxury">Luxury</option>
                <option value="compact">Compact</option>
                <option value="truck">Truck</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Price/Hour ($)</label>
              <input type="number" step="0.01" id="vehicle-price" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Seats</label>
              <input type="number" id="vehicle-seats" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Fuel Type</label>
              <select id="vehicle-fuel" class="w-full px-3 py-2 border rounded-lg" required>
                <option value="gas">Gas</option>
                <option value="electric">Electric</option>
                <option value="hybrid">Hybrid</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Transmission</label>
              <select id="vehicle-transmission" class="w-full px-3 py-2 border rounded-lg" required>
                <option value="automatic">Automatic</option>
                <option value="manual">Manual</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Available</label>
              <select id="vehicle-available" class="w-full px-3 py-2 border rounded-lg">
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
            <input type="url" id="vehicle-image" class="w-full px-3 py-2 border rounded-lg" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Location Address</label>
            <input type="text" id="vehicle-location" class="w-full px-3 py-2 border rounded-lg" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Features (comma separated)</label>
            <input type="text" id="vehicle-features" class="w-full px-3 py-2 border rounded-lg" placeholder="Bluetooth, Navigation, Heated Seats">
          </div>
          <div class="flex gap-4 pt-4">
            <button type="button" onclick="closeVehicleModal()" class="flex-1 px-4 py-2 border rounded-lg">Cancel</button>
            <button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    const API_BASE = '/api';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error('Invalid credentials');

        currentUser = await res.json();
        if (!currentUser.isAdmin) {
          throw new Error('Admin access required');
        }

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        document.getElementById('admin-name').textContent = currentUser.name;
        loadDashboard();
      } catch (err) {
        document.getElementById('login-error').textContent = err.message;
        document.getElementById('login-error').classList.remove('hidden');
      }
    });

    function logout() {
      currentUser = null;
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('dashboard-screen').classList.add('hidden');
    }

    async function loadDashboard() {
      loadStats();
      loadVehicles();
      loadUsers();
      loadTrips();
    }

    async function loadStats() {
      const res = await fetch(`${API_BASE}/admin/stats`);
      const stats = await res.json();
      document.getElementById('stat-users').textContent = stats.totalUsers;
      document.getElementById('stat-vehicles').textContent = stats.totalVehicles;
      document.getElementById('stat-active').textContent = stats.activeTrips;
      document.getElementById('stat-revenue').textContent = '$' + parseFloat(stats.totalRevenue).toLocaleString();
    }

    async function loadVehicles() {
      const res = await fetch(`${API_BASE}/admin/vehicles`);
      const vehicles = await res.json();
      const container = document.getElementById('vehicles-list');
      container.innerHTML = vehicles.map(v => `
        <div class="p-4 flex items-center gap-4">
          <img src="${v.imageUrl}" class="w-20 h-14 object-cover rounded-lg">
          <div class="flex-1">
            <p class="font-semibold">${v.name}</p>
            <p class="text-sm text-gray-500">${v.brand} ${v.model} ${v.year} - ${v.type}</p>
          </div>
          <div class="text-right">
            <p class="font-semibold text-primary">$${parseFloat(v.pricePerHour).toFixed(2)}/hr</p>
            <p class="text-sm ${v.isAvailable ? 'text-green-600' : 'text-red-600'}">${v.isAvailable ? 'Available' : 'Unavailable'}</p>
          </div>
          <div class="flex gap-2">
            <button onclick="editVehicle('${v.id}')" class="px-3 py-1 text-sm border rounded-lg hover:bg-gray-100">Edit</button>
            <button onclick="deleteVehicle('${v.id}')" class="px-3 py-1 text-sm border border-red-300 text-red-600 rounded-lg hover:bg-red-50">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function loadUsers() {
      const res = await fetch(`${API_BASE}/admin/users`);
      const users = await res.json();
      const container = document.getElementById('users-list');
      container.innerHTML = users.map(u => `
        <div class="p-4 flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-semibold">
            ${u.name.charAt(0).toUpperCase()}
          </div>
          <div class="flex-1">
            <p class="font-semibold">${u.name}</p>
            <p class="text-sm text-gray-500">${u.email}</p>
          </div>
          <div class="text-right">
            <p class="text-sm">${u.tripsCompleted || 0} trips</p>
            <p class="text-sm ${u.isAdmin ? 'text-primary font-medium' : 'text-gray-500'}">${u.isAdmin ? 'Admin' : 'User'}</p>
          </div>
        </div>
      `).join('');
    }

    async function loadTrips() {
      const res = await fetch(`${API_BASE}/admin/trips`);
      const trips = await res.json();
      const container = document.getElementById('trips-list');
      
      if (trips.length === 0) {
        container.innerHTML = '<p class="p-8 text-center text-gray-500">No trips yet</p>';
        return;
      }

      container.innerHTML = trips.map(t => `
        <div class="p-4 flex items-center gap-4">
          <div class="flex-1">
            <p class="font-semibold">Trip #${t.id.slice(0, 8)}</p>
            <p class="text-sm text-gray-500">${new Date(t.startDate).toLocaleDateString()} - ${new Date(t.endDate).toLocaleDateString()}</p>
          </div>
          <div class="text-right">
            <p class="font-semibold">$${parseFloat(t.totalCost).toFixed(2)}</p>
            <span class="px-2 py-1 text-xs rounded-full ${getStatusColor(t.status)}">${t.status}</span>
          </div>
        </div>
      `).join('');
    }

    function getStatusColor(status) {
      const colors = {
        upcoming: 'bg-blue-100 text-blue-700',
        active: 'bg-green-100 text-green-700',
        completed: 'bg-gray-100 text-gray-700',
        cancelled: 'bg-red-100 text-red-700'
      };
      return colors[status] || 'bg-gray-100 text-gray-700';
    }

    function showTab(tab) {
      ['vehicles', 'users', 'trips'].forEach(t => {
        document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('bg-primary', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('text-white', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('bg-gray-200', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('text-gray-700', t !== tab);
      });
    }

    let editingVehicle = null;
    const vehicleData = {};

    function openVehicleModal(vehicle = null) {
      editingVehicle = vehicle;
      document.getElementById('modal-title').textContent = vehicle ? 'Edit Vehicle' : 'Add Vehicle';
      document.getElementById('vehicle-modal').classList.remove('hidden');
      document.getElementById('vehicle-modal').classList.add('flex');

      if (vehicle) {
        document.getElementById('vehicle-id').value = vehicle.id;
        document.getElementById('vehicle-name').value = vehicle.name;
        document.getElementById('vehicle-brand').value = vehicle.brand;
        document.getElementById('vehicle-model').value = vehicle.model;
        document.getElementById('vehicle-year').value = vehicle.year;
        document.getElementById('vehicle-type').value = vehicle.type;
        document.getElementById('vehicle-price').value = vehicle.pricePerHour;
        document.getElementById('vehicle-seats').value = vehicle.seats;
        document.getElementById('vehicle-fuel').value = vehicle.fuelType;
        document.getElementById('vehicle-transmission').value = vehicle.transmission;
        document.getElementById('vehicle-available').value = vehicle.isAvailable.toString();
        document.getElementById('vehicle-image').value = vehicle.imageUrl;
        document.getElementById('vehicle-location').value = vehicle.locationAddress;
        document.getElementById('vehicle-features').value = (vehicle.features || []).join(', ');
      } else {
        document.getElementById('vehicle-form').reset();
        document.getElementById('vehicle-id').value = '';
      }
    }

    function closeVehicleModal() {
      document.getElementById('vehicle-modal').classList.add('hidden');
      document.getElementById('vehicle-modal').classList.remove('flex');
      editingVehicle = null;
    }

    async function editVehicle(id) {
      const res = await fetch(`${API_BASE}/vehicles/${id}`);
      const vehicle = await res.json();
      openVehicleModal(vehicle);
    }

    async function deleteVehicle(id) {
      if (!confirm('Are you sure you want to delete this vehicle?')) return;
      await fetch(`${API_BASE}/admin/vehicles/${id}`, { method: 'DELETE' });
      loadVehicles();
      loadStats();
    }

    document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('vehicle-id').value;
      const data = {
        name: document.getElementById('vehicle-name').value,
        brand: document.getElementById('vehicle-brand').value,
        model: document.getElementById('vehicle-model').value,
        year: parseInt(document.getElementById('vehicle-year').value),
        type: document.getElementById('vehicle-type').value,
        pricePerHour: document.getElementById('vehicle-price').value,
        seats: parseInt(document.getElementById('vehicle-seats').value),
        fuelType: document.getElementById('vehicle-fuel').value,
        transmission: document.getElementById('vehicle-transmission').value,
        isAvailable: document.getElementById('vehicle-available').value === 'true',
        imageUrl: document.getElementById('vehicle-image').value,
        locationAddress: document.getElementById('vehicle-location').value,
        features: document.getElementById('vehicle-features').value.split(',').map(f => f.trim()).filter(f => f),
      };

      if (id) {
        await fetch(`${API_BASE}/admin/vehicles/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        await fetch(`${API_BASE}/admin/vehicles`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }

      closeVehicleModal();
      loadVehicles();
      loadStats();
    });
  </script>
</body>
</html>
