<!doctype html>
<html lang="en">
  <head>
    <title>Reset Password - Rush</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      :root {
        --primary: #FF6B35;
        --primary-dark: #E55A28;
        --secondary: #004E89;
        --text-primary: #1A1A1A;
        --text-secondary: #6C757D;
        --background: #FFFFFF;
        --surface: #F8F9FA;
        --border: #E5E5E5;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--background);
        color: var(--text-primary);
        line-height: 1.7;
      }
      
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 24px;
      }
      
      nav {
        background: var(--background);
        border-bottom: 1px solid var(--border);
        padding: 16px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      
      .nav-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text-primary);
      }
      
      .logo-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
      }
      
      .logo-text {
        font-size: 22px;
        font-weight: 700;
        color: var(--primary);
      }
      
      .nav-links a {
        text-decoration: none;
        color: var(--text-secondary);
        font-weight: 500;
        font-size: 14px;
        transition: color 0.2s;
      }
      
      .nav-links a:hover {
        color: var(--primary);
      }
      
      .page-content {
        padding: 60px 0 80px;
        display: flex;
        justify-content: center;
      }
      
      .form-card {
        width: 100%;
        max-width: 460px;
        background: var(--surface);
        border-radius: 12px;
        padding: 40px;
        border: 1px solid var(--border);
      }
      
      .form-card h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-primary);
        text-align: center;
      }
      
      .form-card .description {
        font-size: 15px;
        color: var(--text-secondary);
        margin-bottom: 32px;
        text-align: center;
      }
      
      .form-group {
        margin-bottom: 20px;
      }
      
      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--text-primary);
      }
      
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        font-family: inherit;
        background: var(--background);
        color: var(--text-primary);
        transition: border-color 0.2s;
      }
      
      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
      }
      
      .submit-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }
      
      .submit-btn:hover {
        background: var(--primary-dark);
      }
      
      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      
      .message {
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
      }
      
      .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }
      
      .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }
      
      .app-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        padding: 12px;
        background: var(--secondary);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 15px;
        transition: opacity 0.2s;
      }
      
      .app-link:hover {
        opacity: 0.9;
      }
      
      .back-link {
        display: block;
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-secondary);
      }
      
      .back-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }
      
      .back-link a:hover {
        text-decoration: underline;
      }
      
      footer {
        background: var(--surface);
        padding: 32px 0;
        border-top: 1px solid var(--border);
      }
      
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: var(--text-secondary);
      }
      
      .footer-links {
        display: flex;
        gap: 24px;
      }
      
      .footer-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 14px;
      }
      
      .footer-links a:hover {
        color: var(--primary);
      }
      
      @media (max-width: 600px) {
        .form-card {
          padding: 24px;
        }
        .form-card h1 {
          font-size: 24px;
        }
        .footer-content {
          flex-direction: column;
          gap: 12px;
          text-align: center;
        }
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --text-primary: #F0F0F0;
          --text-secondary: #A0A0A0;
          --background: #1A1A1A;
          --surface: #2A2A2A;
          --border: #3A3A3A;
        }
        .message.success {
          background: #1a3a2a;
          color: #8fd4a0;
          border-color: #2a5a3a;
        }
        .message.error {
          background: #3a1a1a;
          color: #f5a0a0;
          border-color: #5a2a2a;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="container">
        <div class="nav-content">
          <a href="/" class="logo">
            <img src="/assets/images/icon.png?v=2" alt="Rush-Enterprise" class="logo-icon" /><span class="logo-text">Rush-Enterprise</span>
          </a>
          <div class="nav-links">
            <a href="/">Home</a>
          </div>
        </div>
      </div>
    </nav>
    
    <div class="container">
      <div class="page-content">
        <div class="form-card">
          <h1>Reset Your Password</h1>
          <p class="description">Enter your new password below.</p>
          
          <div id="message" class="message"></div>
          
          <form id="resetForm">
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" name="newPassword" placeholder="At least 6 characters" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required minlength="6" />
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
          </form>
          
          <div id="successLink" style="display: none;">
            <a href="/" class="app-link">Go to App</a>
          </div>
          
          <div class="back-link">
            <a href="/forgot-password">Request a new link</a>
          </div>
        </div>
      </div>
    </div>
    
    <footer>
      <div class="container">
        <div class="footer-content">
          <span>&copy; 2025 Rush-Enterprise. All rights reserved.</span>
          <div class="footer-links">
            <a href="/terms">Terms</a>
            <a href="/privacy">Privacy</a>
          </div>
        </div>
      </div>
    </footer>
    
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
        document.getElementById('message').className = 'message error';
        document.getElementById('message').textContent = 'Invalid reset link. Please request a new password reset.';
        document.getElementById('message').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
      }
      
      document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');
        
        if (newPassword.length < 6) {
          messageEl.className = 'message error';
          messageEl.textContent = 'Password must be at least 6 characters long.';
          messageEl.style.display = 'block';
          return;
        }
        
        if (newPassword !== confirmPassword) {
          messageEl.className = 'message error';
          messageEl.textContent = 'Passwords do not match.';
          messageEl.style.display = 'block';
          return;
        }
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';
        messageEl.className = 'message';
        messageEl.style.display = 'none';
        
        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            messageEl.className = 'message success';
            messageEl.textContent = data.message;
            messageEl.style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successLink').style.display = 'block';
          } else {
            messageEl.className = 'message error';
            messageEl.textContent = data.error || 'Something went wrong. Please try again.';
            messageEl.style.display = 'block';
          }
        } catch (err) {
          messageEl.className = 'message error';
          messageEl.textContent = 'Network error. Please try again.';
          messageEl.style.display = 'block';
        }
        
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      });
    </script>
  </body>
</html>
